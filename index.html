<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>麻将胡了</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            touch-action: manipulation;
        }
        body {
            background: #8b4513;
            font-family: "Microsoft Yahei", sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px;
        }
        .header-bar {
            width: 100%;
            background: linear-gradient(180deg, #d42c2c, #a82222);
            color: #ffd700;
            text-align: center;
            padding: 12px 0;
            font-size: 20px;
            font-weight: bold;
            border-radius: 8px 8px 0 0;
            margin-bottom: 5px;
        }
        .multiplier-bar {
            width: 100%;
            background: linear-gradient(180deg, #d48a3c, #b8732b);
            display: flex;
            justify-content: space-around;
            padding: 8px 0;
            border-radius: 0 0 8px 8px;
            margin-bottom: 10px;
        }
        .multiplier {
            color: #fff;
            font-size: 28px;
            font-weight: bold;
            text-shadow: 2px 2px 2px #000;
            transition: all 0.3s;
        }
        .multiplier.active {
            color: #ffd700;
            transform: scale(1.2);
        }
        #gameBoard {
            display: grid;
            grid-template-columns: repeat(5, 60px);
            grid-template-rows: repeat(4, 60px);
            gap: 3px;
            background: #2d882d;
            padding: 8px;
            border-radius: 8px;
            border: 3px solid #d48a3c;
        }
        .tile {
            width: 60px;
            height: 60px;
            background: #fff;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: inset 0 0 5px #999;
        }
        .tile.gold {
            background: linear-gradient(135deg, #ffd700, #ffed4e);
            border: 2px solid #d4af37;
        }
        .wan { color: #d32f2f; }
        .tiao { color: #2e7d32; }
        .tong { color: #1976d2; }
        .zi { color: #7b1fa2; }
        #score {
            color: #fff;
            font-size: 20px;
            margin: 10px 0;
        }
        #winMsg {
            color: #ffd700;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 2px 2px 2px #000;
            margin: 5px 0;
            display: none;
        }
        #spinBtn {
            width: 80px;
            height: 80px;
            background: radial-gradient(circle, #00a800, #007000);
            border: 4px solid #d4af37;
            border-radius: 50%;
            color: #fff;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
            box-shadow: 0 4px 8px #000;
        }
        #spinBtn:active {
            transform: scale(0.95);
        }
        .bet-bar {
            display: flex;
            gap: 15px;
            margin: 10px 0;
            color: #fff;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div class="header-bar">1024 路中奖组合</div>
    <div class="multiplier-bar">
        <div class="multiplier active" data-mult="1">x1</div>
        <div class="multiplier" data-mult="2">x2</div>
        <div class="multiplier" data-mult="3">x3</div>
        <div class="multiplier" data-mult="5">x5</div>
    </div>
    <div class="bet-bar">
        <div>下注: ¥0.05</div>
        <div>奖池: ¥1.80</div>
        <div>当前收益: ¥0.00</div>
    </div>
    <div id="winMsg">胡了！</div>
    <div id="score">得分: 0</div>
    <div id="gameBoard"></div>
    <button id="spinBtn">旋转</button>

    <script>
        const ROWS = 4;
        const COLS = 5;
        const TILES = [
            {name: '1万', cls: 'wan', char: '一万'},
            {name: '8万', cls: 'wan', char: '八萬'},
            {name: '2条', cls: 'tiao', char: '二条'},
            {name: '3条', cls: 'tiao', char: '三条'},
            {name: '5条', cls: 'tiao', char: '五条'},
            {name: '2筒', cls: 'tong', char: '二筒'},
            {name: '5筒', cls: 'tong', char: '五筒'},
            {name: '白板', cls: 'zi', char: '白板'},
            {name: '发财', cls: 'zi', char: '發'}
        ];
        let board = [];
        let score = 0;
        let currentMult = 1;
        let win = 0;
        const scoreEl = document.getElementById('score');
        const winMsgEl = document.getElementById('winMsg');
        const boardEl = document.getElementById('gameBoard');
        const spinBtn = document.getElementById('spinBtn');
        const multiplierEls = document.querySelectorAll('.multiplier');

        function initBoard() {
            board = [];
            for (let r = 0; r < ROWS; r++) {
                const row = [];
                for (let c = 0; c < COLS; c++) {
                    const tile = {...TILES[Math.floor(Math.random() * TILES.length)]};
                    if (Math.random() < 0.1) tile.gold = true;
                    row.push(tile);
                }
                board.push(row);
            }
            renderBoard();
            resetMultipliers();
        }

        function renderBoard() {
            boardEl.innerHTML = '';
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    const tile = document.createElement('div');
                    tile.className = `tile ${board[r][c].cls} ${board[r][c].gold ? 'gold' : ''}`;
                    tile.textContent = board[r][c].char;
                    tile.dataset.r = r;
                    tile.dataset.c = c;
                    tile.addEventListener('click', () => handleClick(r, c));
                    boardEl.appendChild(tile);
                }
            }
        }

        function resetMultipliers() {
            multiplierEls.forEach(el => el.classList.remove('active'));
            multiplierEls[0].classList.add('active');
            currentMult = 1;
        }

        function activateMultiplier(mult) {
            multiplierEls.forEach(el => {
                if (parseInt(el.dataset.mult) === mult) {
                    el.classList.add('active');
                } else {
                    el.classList.remove('active');
                }
            });
            currentMult = mult;
        }

        function handleClick(r, c) {
            const tileName = board[r][c].name;
            const isGold = board[r][c].gold;
            const toRemove = [];
            const visited = Array(ROWS).fill().map(() => Array(COLS).fill(false));

            function dfs(i, j) {
                if (i < 0 || i >= ROWS || j < 0 || j >= COLS || visited[i][j]) return;
                const currentTile = board[i][j];
                if (currentTile.name !== tileName && !currentTile.gold && !isGold) return;
                visited[i][j] = true;
                toRemove.push([i, j]);
                dfs(i + 1, j);
                dfs(i - 1, j);
                dfs(i, j + 1);
                dfs(i, j - 1);
            }

            dfs(r, c);

            if (toRemove.length >= 2) {
                const basePoints = toRemove.length * 10;
                const multPoints = basePoints * currentMult;
                score += multPoints;
                win += (0.05 * multPoints / 100);
                scoreEl.textContent = `得分: ${score}`;
                document.querySelector('.bet-bar div:last-child').textContent = `当前收益: ¥${win.toFixed(2)}`;

                if (toRemove.length >= 5) activateMultiplier(2);
                if (toRemove.length >= 8) activateMultiplier(3);
                if (toRemove.length >= 12) activateMultiplier(5);

                winMsgEl.style.display = 'block';
                setTimeout(() => winMsgEl.style.display = 'none', 1000);

                toRemove.forEach(([i, j]) => board[i][j] = null);

                for (let c = 0; c < COLS; c++) {
                    let writeIdx = ROWS - 1;
                    for (let r = ROWS - 1; r >= 0; r--) {
                        if (board[r][c] !== null) {
                            board[writeIdx][c] = board[r][c];
                            if (writeIdx !== r) board[r][c] = null;
                            writeIdx--;
                        }
                    }
                }

                for (let c = 0; c < COLS; c++) {
                    for (let r = 0; r < ROWS; r++) {
                        if (board[r][c] === null) {
                            const newTile = {...TILES[Math.floor(Math.random() * TILES.length)]};
                            if (Math.random() < 0.1) newTile.gold = true;
                            board[r][c] = newTile;
                        }
                    }
                }

                renderBoard();
            }
        }

        spinBtn.addEventListener('click', () => {
            initBoard();
            score = 0;
            win = 0;
            scoreEl.textContent = `得分: ${score}`;
            document.querySelector('.bet-bar div:last-child').textContent = `当前收益: ¥0.00`;
        });

        initBoard();
    </script>
</body>
</html>
