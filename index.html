<!DOCTYPE html>
<html>
<head>
    <title>我的第一个网站</title>
</head>
<body>
    <h1>欢迎来到我的网站 🎉</h1>
    <p>这是我自己做的网站！</p>

    <button onclick="addScore()">点击加分</button>
    <h2>得分: <span id="score">0</span></h2>

    <script>
        let score = 0;
        function addScore() {
            score++;
            document.getElementById("score").innerText = score;
        }
    </script>
</body>
</html>
